<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Log In</title>
    <style>
      * { box-sizing: border-box; }
      html, body { height: 100%; }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px 16px;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          "Helvetica Neue", Arial, sans-serif;
        background: #fafafa;
        color: #262626;
      }
      .card {
        background: #ffffff;
        border: 1px solid #dbdbdb;
        border-radius: 4px;
        padding: 40px 40px 24px 40px;
        width: 100%;
        max-width: 350px;
      }
      h1 {
        margin: 8px 0 28px 0;
        text-align: center;
        font-size: 28px;
        font-weight: 600;
        letter-spacing: 0.5px;
      }
      .logo-placeholder {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 175px;
        height: 51px;
        margin: 22px auto 12px auto;
        background: #fafafa;
        border: 1px dashed #c7c7c7;
        border-radius: 6px;
        color: #8e8e8e;
        font-size: 12px;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }
      .logo-image {
        display: block;
        max-width: 175px;
        max-height: 60px;
        margin: 22px auto 16px auto;
        object-fit: contain;
      }
      .field { margin-bottom: 8px; }
      input[type="text"],
      input[type="password"] {
        width: 100%;
        padding: 10px 10px 9px 10px;
        font-size: 12px;
        background: #fafafa;
        border: 1px solid #dbdbdb;
        border-radius: 6px;
        outline: none;
        color: #262626;
        transition: border-color 0.15s;
      }
      input[type="text"]::placeholder,
      input[type="password"]::placeholder {
        color: #8e8e8e;
        font-size: 12px;
      }
      input[type="text"]:focus,
      input[type="password"]:focus {
        border-color: #a8a8a8;
      }
      button {
        margin-top: 12px;
        width: 100%;
        padding: 8px 14px;
        font-size: 14px;
        font-weight: 600;
        color: #ffffff;
        background: #0095f6;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        transition: background 0.15s, opacity 0.15s;
      }
      button:hover { background: #1877f2; }
      button:disabled { opacity: 0.6; cursor: not-allowed; }
      .divider {
        display: flex;
        align-items: center;
        margin: 18px 0 14px 0;
        color: #8e8e8e;
        font-size: 13px;
        font-weight: 600;
      }
      .divider::before,
      .divider::after {
        content: "";
        flex: 1;
        height: 1px;
        background: #dbdbdb;
      }
      .divider span { padding: 0 16px; }
      .forgot {
        display: block;
        text-align: center;
        margin-top: 12px;
        font-size: 12px;
        color: #00376b;
        text-decoration: none;
      }
      .forgot:hover { text-decoration: underline; }
      .greeting {
        margin-top: 18px;
        padding: 10px 12px;
        background: #e7f3ff;
        color: #0c5fb3;
        border: 1px solid #c2e0ff;
        border-radius: 6px;
        text-align: center;
        font-size: 14px;
      }
      .signup {
        margin-top: 12px;
        background: #ffffff;
        border: 1px solid #dbdbdb;
        border-radius: 4px;
        padding: 22px;
        width: 100%;
        max-width: 350px;
        text-align: center;
        font-size: 14px;
        color: #262626;
      }
      .signup a {
        color: #0095f6;
        font-weight: 600;
        text-decoration: none;
      }
      .signup a:hover { text-decoration: underline; }
      .stack {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 10px;
        width: 100%;
      }
    </style>
  </head>
  <body>
    <div class="stack">
      <div class="card">
        {% if logo_filename %}
          <img class="logo-image" src="{{ url_for('static', filename=logo_filename) }}" alt="Logo" />
        {% else %}
          <div class="logo-placeholder" aria-label="Logo placeholder">Logo</div>
        {% endif %}
        <form method="post" action="/">
          <div class="field">
            <input
              id="username"
              type="text"
              name="username"
              placeholder="Username"
              autocomplete="username"
              required
            />
          </div>
          <div class="field">
            <input
              id="password"
              type="password"
              name="password"
              placeholder="Password"
              autocomplete="current-password"
              required
            />
          </div>
          <button type="submit">Log In</button>
        </form>

        <div class="divider"><span>OR</span></div>

        <a class="forgot" href="#">Forgot password?</a>

        {% if username %}
          <div class="greeting">Welcome {{ username }}, your login is being processed</div>
        {% endif %}
      </div>

      <div class="signup">
        Don't have an account? <a href="#">Sign up</a>
      </div>
    </div>
  </body>
</html>
